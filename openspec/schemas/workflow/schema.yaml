name: workflow
version: 1
description: Siyu's test workflow to make changes applied and tested properly

artifacts:
  - id: proposal
    generates: proposal.md
    description: Define the problem and motivation for the change
    template: proposal.md
    instruction: |
      Create a proposal that explains WHY this change is needed.
      Focus on the problem, not the solution.
    requires: []

  - id: brainstorm
    generates: brainstorm.md
    description: Explore candidate approaches with pros, cons, and trade-offs
    template: brainstorm.md
    instruction: |
      Brainstorm 2-3 candidate approaches for HOW to solve the problem.
      For each approach, describe it and list pros, cons, and trade-offs.
      End with a recommendation for which approach to carry into design.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Detail the technical approach based on the chosen option
    template: design.md
    instruction: |
      Create a design document explaining HOW to implement.
      Apply DRY, KISS, and YAGNI throughout: no duplication, simplest
      solution that works, and nothing beyond what the proposal requires.
    requires:
      - brainstorm

  - id: test
    generates: test.md
    description: Define test cases and implementation-ready test code specs before implementation
    template: test.md
    instruction: |
      Define test cases BEFORE implementation using the design as input.
      Cover happy paths, edge cases, and error paths.
      Use Given/When/Then format for each scenario.

      For each test case, also specify:
      - The target test file path
      - The test framework and utilities to use
      - A code skeleton that can be copied directly into the codebase
      Match the language and framework conventions of the project.
      The goal is that during implementation, tests can be written first
      by following this plan with minimal interpretation.
    requires:
      - design

  - id: tasks
    generates: tasks.md
    description: Break down the design and test plan into executable tasks
    template: tasks.md
    requires:
      - design
      - test

apply:
  requires: [tasks, test]
  tracks: tasks.md
